<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>发票合并排版工具</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 顶部导航 -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="#2563EB"/>
          <path d="M7 8h14M7 12h10M7 16h12M7 20h8" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">发票合并排版工具</span>
      </div>
      <div class="header-badge">本地处理 · 隐私安全</div>
    </div>
  </header>

  <main class="main">
    <!-- 左侧面板 -->
    <aside class="sidebar">
      <!-- 上传区域 -->
      <section class="card upload-card">
        <div class="card-title">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v9M4 5l4-4 4 4M2 12v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          上传发票
        </div>
        <div class="upload-zone" id="uploadZone">
          <div class="upload-icon">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="20" fill="#EFF6FF"/>
              <path d="M20 12v12M14 18l6-6 6 6" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12 28h16" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <p class="upload-hint-main">拖拽 PDF 文件到此处</p>
          <p class="upload-hint-sub">或点击选择文件</p>
          <button class="btn btn-outline" id="selectBtn">选择 PDF 文件</button>
          <input type="file" id="fileInput" accept=".pdf" multiple hidden />
        </div>
      </section>

      <!-- 排版设置 -->
      <section class="card settings-card">
        <div class="card-title">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2a6 6 0 100 12A6 6 0 008 2zM8 5v3l2 2" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/></svg>
          排版设置
        </div>

        <div class="setting-group">
          <label class="setting-label">排版模式</label>
          <div class="layout-options">
            <label class="layout-option" id="opt-6">
              <input type="radio" name="layout" value="6" checked />
              <div class="layout-preview">
                <div class="lp-grid lp-2x3">
                  <span></span><span></span>
                  <span></span><span></span>
                  <span></span><span></span>
                </div>
              </div>
              <span>2列3行 (6张/页)</span>
            </label>
            <label class="layout-option" id="opt-8">
              <input type="radio" name="layout" value="8" />
              <div class="layout-preview">
                <div class="lp-grid lp-2x4">
                  <span></span><span></span>
                  <span></span><span></span>
                  <span></span><span></span>
                  <span></span><span></span>
                </div>
              </div>
              <span>2列4行 (8张/页)</span>
            </label>
          </div>
        </div>

        <div class="setting-group">
          <label class="setting-label">纸张方向</label>
          <div class="orientation-options">
            <label class="orient-option">
              <input type="radio" name="orientation" value="portrait" checked />
              <svg width="20" height="26" viewBox="0 0 20 26"><rect x="1" y="1" width="18" height="24" rx="2" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/></svg>
              <span>纵向</span>
            </label>
            <label class="orient-option">
              <input type="radio" name="orientation" value="landscape" />
              <svg width="26" height="20" viewBox="0 0 26 20"><rect x="1" y="1" width="24" height="18" rx="2" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/></svg>
              <span>横向</span>
            </label>
          </div>
        </div>

        <div class="setting-group">
          <label class="setting-label">间距 (mm)</label>
          <div class="slider-row">
            <input type="range" id="marginSlider" min="2" max="15" value="5" class="slider" />
            <span class="slider-val" id="marginVal">5</span>
          </div>
        </div>

        <div class="setting-group">
          <label class="setting-label">输出文件名</label>
          <input type="text" id="outputName" class="text-input" value="合并发票" placeholder="输入文件名（无需.pdf）" />
        </div>
      </section>

      <!-- 操作按钮 -->
      <div class="action-area">
        <button class="btn btn-secondary" id="previewBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.5"/></svg>
          预览排版
        </button>
        <button class="btn btn-primary" id="mergeBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v9M4 5l4-4 4 4M2 12v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          合并导出 PDF
        </button>
      </div>
    </aside>

    <!-- 中间发票列表 -->
    <section class="invoice-panel">
      <div class="panel-header">
        <span class="panel-title">发票列表</span>
        <span class="invoice-count" id="invoiceCount">0 张</span>
        <button class="btn-icon" id="clearAllBtn" title="清空全部" style="display:none">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="invoice-list" id="invoiceList">
        <div class="empty-state" id="emptyState">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="8" y="4" width="32" height="40" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="2"/><path d="M16 16h16M16 22h12M16 28h8" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/></svg>
          <p>暂无发票</p>
          <p class="empty-sub">请上传 PDF 发票文件</p>
        </div>
      </div>
    </section>

    <!-- 右侧预览区 -->
    <section class="preview-panel">
      <div class="panel-header">
        <span class="panel-title">排版预览</span>
        <div class="preview-nav" id="previewNav" style="display:none">
          <button class="btn-icon" id="prevPage">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L5 7l4 5" stroke="#374151" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <span id="pageInfo">1 / 1</span>
          <button class="btn-icon" id="nextPage">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2l4 5-4 5" stroke="#374151" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
      <div class="preview-area" id="previewArea">
        <div class="preview-placeholder" id="previewPlaceholder">
          <svg width="56" height="56" viewBox="0 0 56 56" fill="none"><rect x="4" y="4" width="48" height="48" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/><path d="M14 20h28M14 28h20M14 36h24" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/></svg>
          <p>点击「预览排版」查看效果</p>
        </div>
        <div class="preview-pages" id="previewPages"></div>
      </div>
    </section>
  </main>

  <!-- 进度遮罩 -->
  <div class="progress-overlay" id="progressOverlay" style="display:none">
    <div class="progress-box">
      <div class="progress-spinner"></div>
      <p class="progress-text" id="progressText">处理中...</p>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>
  </div>

  <!-- 日志面板 -->
  <button class="log-toggle-btn" id="logToggle">▶ 查看日志</button>
  <div class="log-panel" id="logPanel" style="display:none">
    <div class="log-panel-header">
      <span>📋 运行日志</span>
      <button class="btn-icon" id="logClearBtn" title="清空日志">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="log-body" id="logBody"></div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- 脚本 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    // 配置 PDF.js worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  <script src="app.js"></script>
</body>
</html>
